name: One-time JavaScript bundle repair

on:
  push:
    branches:
      - fix/javascript-bundle-20260719
    paths:
      - ".github/workflows/repair-js.yml"

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Reassemble and verify bundle
        shell: bash
        run: |
          : > assets/main-JNtmfxqX.js
          for part in .repair-js/chunk-*; do
            cat "$part" >> assets/main-JNtmfxqX.js
          done
          actual_sha="$(git hash-object assets/main-JNtmfxqX.js)"
          test "$actual_sha" = "727b1c85d5aebaec635bc957958877a03b319fe0"
      - name: Commit repaired bundle
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm -r .repair-js
          git rm .github/workflows/repair-js.yml
          git add assets/main-JNtmfxqX.js
          git commit -m "fix: restore JavaScript bundle"
          git push
